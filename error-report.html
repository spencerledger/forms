<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Google Form</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSemHfyqAAPeDzPYOnidNLyd1igDvEdsmG_K7MydsYIlFKYDZQ/viewform?embedded=true" 
    allowfullscreen>
  </iframe>
</body>
</html>
