<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>Email Feedback Form</title>
  <link rel="icon" href="https://cdn.spencers.zone/images/triad-favicon.ico" type="image/x-icon" />

  <script async src="https://tally.so/widgets/embed.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: absolute; 
      top: 0; 
      right: 0; 
      bottom: 0; 
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>

  <script>
    // Title flipper
    let titles = ["Email Feedback Form", "The Spencer Ledger Website"];
    let index = 0;

    setInterval(() => {
      document.title = titles[index];
      index = (index + 1) % titles.length;
    }, 3000); // every 3 seconds
  </script>
</head>
<body>

  <iframe 
    data-tally-src="https://tally.so/r/GxkzDe?transparentBackground=1&formEventsForwarding=1" 
    width="100%" 
    height="100%" 
    frameborder="0" 
    marginheight="0" 
    marginwidth="0" 
    title="Email Feedback Form"
    allowfullscreen>
  </iframe>

</body>
</html>
